name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.23.x'}
      - name: Build binaries
        working-directory: engine
        run: |
          mkdir -p ../dist
          GOOS=linux GOARCH=amd64 go build -o ../dist/agidb-on-chain-linux-amd64 ./cmd/agidb
          GOOS=windows GOARCH=amd64 go build -o ../dist/agidb-on-chain-windows-amd64.exe ./cmd/agidb
          cd ../dist && sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
